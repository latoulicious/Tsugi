# Tsugi production port pin for the lazyscan stack (explicit, canonical).
# !override replaces the base port list instead of appending it (compose >=2.24.4).
# web is the nginx edge (SPA + /api); it listens on :80 in-container.
# Matches the live tunnel: lazyscan.my.id -> 127.0.0.1:8080.
services:
  web:
    ports: !override
      - "127.0.0.1:8080:80"
