# Tsugi production port pin for the lazyscan stack (canonical ports, explicit).
# !override replaces the base port list instead of appending it (compose >=2.24.4).
services:
  aegis:
    ports: !override
      - "127.0.0.1:8080:8080"
  minio:
    ports: !override
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
