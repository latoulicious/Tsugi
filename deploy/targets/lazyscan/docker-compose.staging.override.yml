# Tsugi staging port shift for the lazyscan stack (avoid prod clash on one VPS).
# !override replaces the base port list instead of appending it (compose >=2.24.4).
# prod web holds 8080, so staging publishes on 8090.
# Matches the live tunnel: staging.lazyscan.my.id -> 127.0.0.1:8090.
services:
  web:
    ports: !override
      - "127.0.0.1:8090:80"
